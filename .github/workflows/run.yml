name: Binance Bot

on:

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Устанавливаем Node.js (нужен для навыка)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Устанавливаем официальный навык Binance Square
      - name: Install Binance Square Skill
        run: |
          npx skills add https://github.com/binance/binance-skills-hub/tree/main/skills/binance/square-post
          # Сохраняем API-ключ в конфиг навыка
          mkdir -p ~/.config/binance-square
          echo "${{ secrets.SQUARE_API }}" > ~/.config/binance-square/openapi-key

      - name: Cache published history
        uses: actions/cache@v3
        with:
          path: published_history.json
          key: published-history-${{ github.run_id }}
          restore-keys: |
            published-history-

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          MISTRAL_API: ${{ secrets.MISTRAL_API }}
          # SQUARE_API теперь используется только для сохранения в конфиг навыка
