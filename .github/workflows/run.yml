name: Binance Bot

on:

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Node.js обязателен для запуска скриптов навыка
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Устанавливаем навык через npx skills add
      - name: Install Binance Square Skill
        run: |
          npx skills add https://github.com/binance/binance-skills-hub --skill square-post -g -y
          # Проверяем, что навык установлен
          ls -la node_modules/@binance/square-post/scripts/ || ls -la ~/.skills/skills/binance-square-post/scripts/

      - name: Cache published history
        uses: actions/cache@v3
        with:
          path: published_history.json
          key: published-history-${{ github.run_id }}
          restore-keys: |
            published-history-

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          MISTRAL_API: ${{ secrets.MISTRAL_API }}
          SQUARE_API: ${{ secrets.SQUARE_API }}
