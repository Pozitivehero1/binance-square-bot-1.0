name: Binance Bot

on:
 
  workflow_dispatch:          # ручной запуск

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Node.js нужен для работы навыка
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Устанавливаем официальный навык Binance Square
      - name: Install Binance Square Skill
        run: |
          npx skills add https://github.com/binance/binance-skills-hub --skill square-post -y
          # Сохраняем API-ключ в конфиг навыка
          mkdir -p ~/.config/binance-square
          echo "${{ secrets.SQUARE_API }}" > ~/.config/binance-square/openapi-key
          # Проверяем, что навык установлен и показываем путь
          echo "Searching for post-text.mjs..."
          find /home/runner -name "post-text.mjs" 2>/dev/null || echo "Not found"
          find . -name "post-text.mjs" 2>/dev/null || echo "Not found in current dir"

      # Кэшируем историю публикаций, чтобы избежать дублей
      - name: Cache published history
        uses: actions/cache@v3
        with:
          path: published_history.json
          key: published-history-${{ github.run_id }}
          restore-keys: |
            published-history-

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          MISTRAL_API: ${{ secrets.MISTRAL_API }}
          SQUARE_API: ${{ secrets.SQUARE_API }}
